name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.1"

      - name: Sync Capacitor Android project
        working-directory: frontend
        env:
          CAP_SERVER_URL: ${{ vars.CAP_SERVER_URL }}
        run: |
          if [ -z "${CAP_SERVER_URL}" ]; then
            echo "CAP_SERVER_URL is not set. Using https://example.com for build."
            export CAP_SERVER_URL="https://example.com"
          fi
          npm run android:sync

      - name: Ensure Gradle wrapper executable
        run: |
          sed -i 's/\r$//' frontend/android/gradlew
          chmod +x frontend/android/gradlew

      - name: Build APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: |
            frontend/android/app/build/outputs/apk/debug/app-debug.apk
            frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            frontend/android/app/build/outputs/apk/debug/app-debug.apk
            frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
